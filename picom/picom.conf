backend = "glx";
vsync = true;

shadow = true;
shadow-radius = 16;
shadow-opacity = 0.8;
shadow-offset-x = -12;
shadow-offset-y = -12;

fading = true;
fade-in-step = 0.028;
fade-out-step = 0.03;
fade-delta = 4;

inactive-opacity = 0.96;
frame-opacity = 0.92;
inactive-opacity-override = false;

corner-radius = 8;
detect-rounded-corners = true;
detect-client-opacity = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-damage = true;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'"
];

fade-exclude = [
  "class_g = 'slop'",
  "class_g = 'xbanish'"
];
