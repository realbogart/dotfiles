backend = "glx";
vsync = true;
use-damage = true;
use-ewmh-active-win = true;
detect-transient = true;
detect-client-leader = true;
unredir-if-possible = true;

shadow = true;
shadow-radius = 16;
shadow-opacity = 0.8;
shadow-offset-x = -12;
shadow-offset-y = -12;

fading = true;
fade-in-step = 0.05;
fade-out-step = 0.07;
fade-delta = 5;

inactive-opacity = 0.96;
frame-opacity = 0.92;
inactive-opacity-override = false;
no-fading-openclose = false;

corner-radius = 8;
detect-rounded-corners = true;
detect-client-opacity = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;

animations = (
  {
    triggers = [ "open", "show" ];
    preset = "appear";
    scale = 0.92;
    duration = 0.16;
  },
  {
    triggers = [ "close", "hide" ];
    preset = "disappear";
    scale = 0.92;
    duration = 0.14;
  },
  {
    triggers = [ "geometry" ];
    preset = "geometry-change";
    duration = 0.14;
  }
);

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'xmobar'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "fullscreen"
];

fade-exclude = [
  "class_g = 'slop'",
  "class_g = 'xbanish'",
  "class_g = 'xmobar'"
];

rounded-corners-exclude = [
  "class_g = 'xmobar'",
  "fullscreen"
];
